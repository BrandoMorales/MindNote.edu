<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registrar - MindNote.edu</title>
  <link rel="stylesheet" href="../static/css/registrar.css">
</head>
<body>
  <header>
    <nav class="navbar">
      <div class="logo"><img src="/logo.png" alt="80" height="80"></div>
      <ul class="nav-links">
        <li><a href="/index.html">Inicio</a></li>
        <li><a href="/templates/registrar.html" class="active">Registrar</a></li>
        <li><a href="/templates/login.html">Iniciar Sesión</a></li>
      </ul>
    </nav>
  </header>

  <section class="form-container">
    <form class="form-box" id="formRegistro">
  <h2>Crear cuenta</h2>
  <div class="input-group">
    <label for="nombre">Nombre completo</label>
    <input type="text" id="nombre" required>
  </div>
  <div class="input-group">
    <label for="correo">Correo electrónico</label>
    <input type="email" id="correo" required>
  </div>
  <div class="input-group">
    <label for="password">Contraseña</label>
    <input type="password" id="password" required>
  </div>
  <button type="submit" class="btn">Registrar</button>
  <p class="redirect">¿Ya tienes cuenta? <a href="login.html">Inicia sesión</a></p>
</form>

<script src="../static/js/registrar.js"></script>

  </section>
</body>
</html>
