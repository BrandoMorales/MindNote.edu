<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesión - MindNote.edu</title>
  <link rel="stylesheet" href="../static/css/login.css">
</head>
<body>
  <header>
    <nav class="navbar">
      <div class="logo"><img src="/logo.png" alt="80" height="80"></div>
      <ul class="nav-links">
        <li><a href="index.html">Inicio</a></li>
        <li><a href="registrar.html">Registrar</a></li>
        <li><a href="login.html" class="active">Iniciar Sesión</a></li>
      </ul>
    </nav>
  </header>

  <section class="form-container">
    <form class="form-box" id="formLogin">
  <h2>Iniciar Sesión</h2>
  <div class="input-group">
    <label for="correo">Correo electrónico</label>
    <input type="email" id="correo" required>
  </div>
  <div class="input-group">
    <label for="password">Contraseña</label>
    <input type="password" id="password" required>
  </div>
  <button type="submit" class="btn">Entrar</button>
  <p class="redirect">¿No tienes cuenta? <a href="registrar.html">Regístrate</a></p>
</form>

<script src="../static/js/login.js"></script>

  </section>
</body>
</html>
